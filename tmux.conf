set -g prefix C-a
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g renumber-windows on
set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
setw -g monitor-activity on
set -g visual-activity on
set -g display-time 3000
set -g set-titles on
set -g status-position bottom
set -g status-interval 1
set -g status-left-length 40
set -g status-right-length 60
setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-style "fg=white,bg=default"
setw -g window-status-activity-style "fg=red,bg=default"
set -g message-style "fg=white,bg=black,bright"
set -g message-command-style "fg=white,bg=black"
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=cyan"
set -g pane-border-status bottom
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
bind z resize-pane -Z
bind -r "<" swap-window -t -1
bind -r ">" swap-window -t +1
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind e setw synchronize-panes on
bind E setw synchronize-panes off
bind -T copy-mode-vi / command-prompt -i -p "search" "send -X search-forward-incremental '%%'"
bind -T copy-mode-vi ? command-prompt -i -p "search" "send -X search-backward-incremental '%%'"
set -g history-limit 10000
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
run '~/.tmux/plugins/tpm/tpm'
